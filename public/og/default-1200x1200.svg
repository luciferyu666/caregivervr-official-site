    <text x="257" y="537" text-anchor="middle" fill="#D7E4F3" font-size="20" font-weight="700" font-family="'Inter', 'Noto Sans TC', sans-serif">Training Workflow</text>
    <rect x="398" y="500" width="210" height="58" rx="29" fill="rgba(69, 199, 214, 0.14)" stroke="rgba(147, 239, 245, 0.22)"/>
    <text x="503" y="537" text-anchor="middle" fill="#D7E4F3" font-size="20" font-weight="700" font-family="'Inter', 'Noto Sans TC', sans-serif">Quest 3</text>
    <rect x="624" y="500" width="226" height="58" rx="29" fill="rgba(255,255,255,0.05)" stroke="rgba(207,228,255,0.12)"/>
    <text x="737" y="537" text-anchor="middle" fill="#D7E4F3" font-size="20" font-weight="700" font-family="'Inter', 'Noto Sans TC', sans-serif">AAR Review</text>
  </g>
  <g>
    <rect x="132" y="658" width="936" height="320" rx="36" fill="rgba(255,255,255,0.04)" stroke="rgba(207,228,255,0.1)"/>
    <text x="180" y="724" fill="#93EFF5" font-size="18" font-weight="700" font-family="'Inter', 'Noto Sans TC', sans-serif">OFFICIAL WEBSITE BRAND SYSTEM</text>
    <text x="180" y="798" fill="#F5F9FF" font-size="42" font-weight="700" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif">品牌字體系統</text>
    <text x="180" y="860" fill="#F5F9FF" font-size="42" font-weight="700" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif">色票與 Design Token</text>
    <text x="180" y="922" fill="#F5F9FF" font-size="42" font-weight="700" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif">社群圖與 Metadata 規格</text>
  </g>
  <defs>
