<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CareMirror 預設方形 OG 圖</title>
  <desc id="desc">CareMirror 照護之鏡的方形社群分享圖，展示品牌名稱、中文品牌與品牌色塊。</desc>
  <rect width="1200" height="1200" fill="#05111F"/>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <circle cx="910" cy="166" r="250" fill="url(#glowA)"/>
  <circle cx="224" cy="121" r="240" fill="url(#glowB)"/>
  <rect x="84" y="84" width="1032" height="1032" rx="48" fill="rgba(10, 23, 40, 0.88)" stroke="rgba(207, 228, 255, 0.14)"/>
  <rect x="132" y="136" width="118" height="118" rx="32" fill="url(#mark)"/>
  <path d="M170 184C170 161.356 188.356 143 211 143C233.644 143 252 161.356 252 184V195H230V184C230 173.507 221.493 165 211 165C200.507 165 192 173.507 192 184V213C192 223.493 200.507 232 211 232C218.898 232 225.672 227.182 228.533 220H252C247.605 237.849 231.481 251 211 251C188.356 251 170 232.644 170 210V184Z" fill="#F5F9FF"/>
  <text x="280" y="216" fill="#F5F9FF" font-size="74" font-weight="700" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif">CareMirror</text>
  <text x="132" y="340" fill="#CFE4FF" font-size="34" font-weight="600" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif">照護之鏡</text>
  <text x="132" y="410" fill="#9DB1C7" font-size="28" font-weight="500" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif">將高敏感度照護教學整理為可重複演練、可追蹤評分、可正式展示的 VR 產品敘事。</text>
  <g>
