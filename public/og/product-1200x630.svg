<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CareMirror 產品頁 OG 圖</title>
  <desc id="desc">CareMirror 照護之鏡產品頁社群分享圖，強調訓練流程、判定追蹤與 After Action Review 機制。</desc>
  <rect width="1200" height="630" fill="#05111F"/>
