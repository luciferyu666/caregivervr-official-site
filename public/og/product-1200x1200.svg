<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CareMirror 產品頁方形 OG 圖</title>
  <desc id="desc">CareMirror 照護之鏡產品頁方形社群分享圖，說明產品亮點、流程判定與回顧機制。</desc>
  <rect width="1200" height="1200" fill="#05111F"/>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <circle cx="908" cy="178" r="252" fill="url(#glowA)"/>
  <circle cx="260" cy="92" r="242" fill="url(#glowB)"/>
  <rect x="84" y="84" width="1032" height="1032" rx="48" fill="rgba(8, 18, 33, 0.92)" stroke="rgba(207,228,255,0.14)"/>
  <text x="136" y="164" fill="#93EFF5" font-size="20" font-weight="700" font-family="'Inter', 'Noto Sans TC', sans-serif">PRODUCT OVERVIEW</text>
  <text x="136" y="286" fill="#F5F9FF" font-size="78" font-weight="700" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif">CareMirror</text>
  <text x="136" y="368" fill="#CFE4FF" font-size="62" font-weight="700" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif">照護之鏡</text>
  <text x="136" y="448" fill="#9DB1C7" font-size="30" font-weight="500" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif">以教學流程為核心，將步驟判定、錯誤追蹤、報表與回顧整合成可正式介紹的產品架構。</text>
  <g>
    <rect x="136" y="540" width="216" height="58" rx="29" fill="rgba(86,168,255,0.18)"/>
    <text x="244" y="577" text-anchor="middle" fill="#F5F9FF" font-size="20" font-weight="700" font-family="'Inter', 'Noto Sans TC', sans-serif">流程判定</text>
    <rect x="370" y="540" width="216" height="58" rx="29" fill="rgba(69,199,214,0.16)"/>
    <text x="478" y="577" text-anchor="middle" fill="#F5F9FF" font-size="20" font-weight="700" font-family="'Inter', 'Noto Sans TC', sans-serif">錯誤追蹤</text>
    <rect x="604" y="540" width="236" height="58" rx="29" fill="rgba(255,255,255,0.05)" stroke="rgba(207,228,255,0.12)"/>
    <text x="722" y="577" text-anchor="middle" fill="#F5F9FF" font-size="20" font-weight="700" font-family="'Inter', 'Noto Sans TC', sans-serif">AAR 回顧</text>
  </g>
  <g>
    <rect x="136" y="674" width="928" height="300" rx="38" fill="rgba(255,255,255,0.04)" stroke="rgba(207,228,255,0.1)"/>
    <rect x="176" y="714" width="408" height="134" rx="28" fill="rgba(11,23,39,0.94)" stroke="rgba(86,168,255,0.2)"/>
    <path d="M214 770H538" stroke="#CFE4FF" stroke-width="8" stroke-linecap="round"/>
    <path d="M214 802H486" stroke="#45C7D6" stroke-width="8" stroke-linecap="round"/>
    <rect x="214" y="830" width="112" height="18" rx="9" fill="#56A8FF"/>
    <rect x="340" y="830" width="78" height="18" rx="9" fill="#93EFF5"/>
    <rect x="640" y="714" width="384" height="134" rx="28" fill="rgba(11,23,39,0.94)" stroke="rgba(69,199,214,0.2)"/>
    <circle cx="698" cy="770" r="18" fill="#56A8FF"/>
    <circle cx="748" cy="770" r="18" fill="#45C7D6"/>
    <circle cx="798" cy="770" r="18" fill="#93EFF5"/>
    <path d="M850 750H978" stroke="#CFE4FF" stroke-width="8" stroke-linecap="round"/>
    <path d="M850 782H952" stroke="#56A8FF" stroke-width="8" stroke-linecap="round"/>
    <path d="M850 814H920" stroke="#45C7D6" stroke-width="8" stroke-linecap="round"/>
    <text x="176" y="908" fill="#D7E4F3" font-size="18" font-weight="700" font-family="'Inter', 'Noto Sans TC', sans-serif">模組預覽、流程判定與 AAR 語意需要維持同一套品牌與產品敘事。</text>
  </g>
  <defs>
    <linearGradient id="bg" x1="174" y1="44" x2="996" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07121E"/>
      <stop offset="0.58" stop-color="#0A1830"/>
      <stop offset="1" stop-color="#030916"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(908 178) rotate(90) scale(252)">
      <stop stop-color="#45C7D6" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#45C7D6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 92) rotate(90) scale(242)">
      <stop stop-color="#56A8FF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#56A8FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
